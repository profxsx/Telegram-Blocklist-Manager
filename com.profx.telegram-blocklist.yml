app-id: com.profx.telegram-blocklist
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: telegram-blocklist
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri

modules:
  - name: python-dependencies
    buildsystem: simple
    build-commands:
      - pip install --prefix=/app .
    sources:
      - type: pip
        packages:
          - telethon
          - pysocks

  - name: telegram-blocklist
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/telegram-blocklist
      - cp main.py telegram_client.py ui_login.py ui_window.py /app/share/telegram-blocklist/
      - mkdir -p /app/bin
      - |
        echo '#!/usr/bin/env python3' > /app/bin/telegram-blocklist
        echo 'import sys' >> /app/bin/telegram-blocklist
        echo 'sys.path.insert(0, "/app/share/telegram-blocklist")' >> /app/bin/telegram-blocklist
        echo 'import main' >> /app/bin/telegram-blocklist
        echo 'main.main()' >> /app/bin/telegram-blocklist
      - chmod +x /app/bin/telegram-blocklist
      - install -D com.profx.telegram-blocklist.desktop /app/share/applications/com.profx.telegram-blocklist.desktop
      - install -D com.profx.telegram-blocklist.metainfo.xml /app/share/metainfo/com.profx.telegram-blocklist.metainfo.xml
    sources:
      - type: dir
        path: .
